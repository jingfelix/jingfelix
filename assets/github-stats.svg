<svg
  width="450"
  height="195"
  viewBox="0 0 450 195"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="titleId descId"
>
  <title id="titleId">Tianyi Jing&apos;s GitHub Contributions</title>
  <desc id="descId">657 contributions in the last year. 338 private contributions included.</desc>
  <style>
    .title {
      font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #ffffff;
      animation: fadeIn 0.8s ease-in-out forwards;
    }
    .number {
      font: 700 60px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #ffffff;
      animation: riseIn 0.7s ease-out forwards;
      letter-spacing: -1px;
    }
    .subtitle {
      font: 500 16px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: rgba(255, 255, 255, 0.94);
      animation: fadeIn 1s ease-in-out forwards;
    }
    .pill {
      font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #ffffff;
      animation: fadeIn 1.2s ease-in-out forwards;
    }
    .pill-bg {
      fill: rgba(255, 255, 255, 0.12);
      stroke: rgba(255, 255, 255, 0.2);
    }
    .shape-a {
      fill: rgba(255, 255, 255, 0.09);
    }
    .shape-b {
      fill: rgba(255, 255, 255, 0.06);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <defs>
    <linearGradient id="gradient" gradientTransform="rotate(8)" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12c2e9" />
      <stop offset="52%" stop-color="#c471ed" />
      <stop offset="100%" stop-color="#f64f59" />
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="449" height="194" rx="18" fill="url(#gradient)" />
  <circle class="shape-a" cx="386" cy="42" r="54" />
  <circle class="shape-b" cx="415" cy="132" r="72" />
  <circle class="shape-b" cx="56" cy="171" r="42" />
  <g transform="translate(28, 34)">
    <text class="title">Tianyi Jing&apos;s GitHub Contributions</text>
    <text class="number" x="0" y="82">657</text>
    <text class="subtitle" x="0" y="114">contributions in the last year</text>
    <g transform="translate(0, 132)">
      <rect class="pill-bg" width="228" height="28" rx="14" />
      <text class="pill" x="14" y="18">338 private contributions included</text>
    </g>
  </g>
</svg>